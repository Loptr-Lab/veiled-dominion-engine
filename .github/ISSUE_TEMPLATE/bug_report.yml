name: Bug report
description: Report a reproducible problem in the engine, tooling, or docs.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Veiled Dominion. Please provide enough detail for maintainers and contributors to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core mechanics
        - Rules documentation
        - Devcontainer / Codespaces
        - CI / automation
        - Website / docs site
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, toolchain, browser, or platform details if relevant.
      placeholder: macOS 15, VS Code, Dev Container, .NET 8
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, logs, links to related issues/PRs, or rule interactions.
