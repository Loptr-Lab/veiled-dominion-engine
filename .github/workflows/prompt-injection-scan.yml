name: Prompt Injection Scan

on:
  pull_request:
  push:
    branches:
      - main
      - security/**

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run prompt injection scan
        run: node scripts/scan-prompt-injection.js
